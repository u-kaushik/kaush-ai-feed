<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Feed — OpenClaw</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%233b82f6' width='100' height='100' rx='20'/%3E%3Cpolygon fill='white' points='35,25 35,75 75,50'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">▶</span>
          <div>
            <span class="logo-title">AI Feed</span>
            <span class="logo-sub">OpenClaw Intelligence</span>
          </div>
        </div>
        <div class="header-meta">
          <span id="video-count" class="video-count"></span>
          <button id="refresh-btn" class="refresh-btn" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="search-row">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Search videos, summaries..."
            class="search-input"
            autocomplete="off"
          />
          <button id="search-clear" class="search-clear" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <div id="tag-filters" class="tag-filters">
        <!-- populated by JS -->
      </div>

      <div id="channel-filter-bar" class="channel-filter-bar" style="display:none">
        <span class="channel-filter-label">Filtering:</span>
        <button id="clear-channel-filter" class="channel-filter-btn">
          <span id="active-channel-name"></span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="feed" class="feed">
      <!-- skeleton + cards injected by JS -->
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
